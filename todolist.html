<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taskflow — Premium To-Do List</title>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome for sleek icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS stylesheet -->
    <link rel="stylesheet" href="todolist.css">
</head>
<body>
    <div class="background-decor">
        <div class="circle circle-1"></div>
        <div class="circle circle-2"></div>
    </div>

    <main class="app-container">
        <header class="app-header">
            <div class="logo-area">
                <div class="logo-icon">
                    <i class="fa-solid fa-square-check"></i>
                </div>
                <div class="logo-text">
                    <h1>Taskflow</h1>
                    <p>Elevate your productivity</p>
                </div>
            </div>
            <div class="header-right">
                <div id="dateTimeDisplay" class="datetime-display">
                    <span id="currentDate"></span>
                    <span id="currentTime"></span>
                </div>
                <div class="theme-toggle" id="themeToggleBtn" aria-label="Toggle theme">
                    <i class="fa-solid fa-moon"></i>
                </div>
            </div>
        </header>

        <section class="task-input-section">
            <form id="todoForm" class="todo-form">
                <div class="input-wrapper">
                    <i class="fa-solid fa-plus input-icon"></i>
                    <input type="text" id="todoInput" placeholder="Add a new task..." autocomplete="off" required>
                </div>
                
                <div class="task-meta-inputs">
                    <div class="meta-select-wrapper">
                        <i class="fa-solid fa-triangle-exclamation"></i>
                        <select id="todoPriority" aria-label="Priority">
                            <option value="low">Low Priority</option>
                            <option value="medium" selected>Medium Priority</option>
                            <option value="high">High Priority</option>
                        </select>
                    </div>

                    <div class="meta-select-wrapper">
                        <i class="fa-solid fa-tag"></i>
                        <select id="todoCategory" aria-label="Category">
                            <option value="Personal" selected>Personal</option>
                            <option value="Work">Work</option>
                            <option value="Study">Study</option>
                        </select>
                    </div>

                    <div class="meta-input-wrapper">
                        <i class="fa-solid fa-calendar-days"></i>
                        <input type="date" id="todoDeadline" aria-label="Deadline date">
                    </div>
                </div>

                <button type="submit" class="btn-add" id="addBtn" aria-label="Add Task">
                    <span>Add Task</span>
                    <i class="fa-solid fa-arrow-right"></i>
                </button>
            </form>
        </section>

        <section class="search-filter-section">
            <div class="search-wrapper">
                <i class="fa-solid fa-magnifying-glass search-icon"></i>
                <input type="text" id="searchInput" placeholder="Search tasks..." autocomplete="off">
            </div>
            <div class="category-filters" id="categoryFilters">
                <button class="cat-filter-btn active" data-category="all">All Cats</button>
                <button class="cat-filter-btn" data-category="Personal">Personal</button>
                <button class="cat-filter-btn" data-category="Work">Work</button>
                <button class="cat-filter-btn" data-category="Study">Study</button>
            </div>
        </section>

        <section class="task-list-section">
            <div class="list-filters">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="active">Active</button>
                <button class="filter-btn" data-filter="completed">Completed</button>
            </div>

            <div class="todo-list-wrapper">
                <ul id="todoList" class="todo-list">
                    <!-- Tasks will be injected here by JavaScript -->
                </ul>
                <div id="emptyState" class="empty-state">
                    <div class="empty-icon">
                        <i class="fa-solid fa-list-check"></i>
                    </div>
                    <h3>No tasks found</h3>
                    <p>Try modifying your filters or add a new task.</p>
                </div>
            </div>
        </section>

        <footer class="app-footer">
            <div class="task-counter">
                <span id="itemsLeft">0</span> items left
            </div>
            <button id="clearCompletedBtn" class="btn-clear">
                <i class="fa-solid fa-trash-can"></i>
                Clear Completed
            </button>
        </footer>
    </main>

    <!-- Custom JS script -->
    <script src="todolist.js"></script>
</body>
</html>
